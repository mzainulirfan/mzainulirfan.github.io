<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Login</title>
    <link rel="stylesheet" href="dist/css/main.css" />
    <link rel="shortcut icon" href="dist/img/logo.png" type="image/png" />
  </head>
  <body>
    <div
      class="w-full h-screen bg-gradient-to-r from-indigo-500 via-purple-600 to-indigo-900 flex justify-center items-center">
      <div class="lg:w-4/12 mx-auto bg-white p-8 rounded-xl shadow-lg">
        <div class="flex flex-col items-center">
          <h1 class="text-2xl text-indigo-500 font-semibold uppercase">
            Login form
          </h1>
          <p class="font-normal text-sm text-zink-800">
            Lorem ipsum dolor sit amet consectetur adipisicing elit Quidem
          </p>
        </div>
        <div class="p-4 mt-2 rounded-md">
          <form action="" method="post" class="p-2">
            <div class="flex flex-col gap-2 mb-3">
              <label for="email">Email</label>
              <div class="flex relative">
                <input
                  type="text"
                  class="w-full border py-2 focus:ring-2 focus:ring-indigo-500/50 px-3 rounded-lg outline-none"
                  placeholder="myemail@gmail.com"
                  id="email"
                  autofocus />
                <span class="absolute right-6 top-3 text-gray-600"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-envelope-at"
                    viewBox="0 0 16 16">
                    <path
                      d="M2 2a2 2 0 0 0-2 2v8.01A2 2 0 0 0 2 14h5.5a.5.5 0 0 0 0-1H2a1 1 0 0 1-.966-.741l5.64-3.471L8 9.583l7-4.2V8.5a.5.5 0 0 0 1 0V4a2 2 0 0 0-2-2H2Zm3.708 6.208L1 11.105V5.383l4.708 2.825ZM1 4.217V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v.217l-7 4.2-7-4.2Z" />
                    <path
                      d="M14.247 14.269c1.01 0 1.587-.857 1.587-2.025v-.21C15.834 10.43 14.64 9 12.52 9h-.035C10.42 9 9 10.36 9 12.432v.214C9 14.82 10.438 16 12.358 16h.044c.594 0 1.018-.074 1.237-.175v-.73c-.245.11-.673.18-1.18.18h-.044c-1.334 0-2.571-.788-2.571-2.655v-.157c0-1.657 1.058-2.724 2.64-2.724h.04c1.535 0 2.484 1.05 2.484 2.326v.118c0 .975-.324 1.39-.639 1.39-.232 0-.41-.148-.41-.42v-2.19h-.906v.569h-.03c-.084-.298-.368-.63-.954-.63-.778 0-1.259.555-1.259 1.4v.528c0 .892.49 1.434 1.26 1.434.471 0 .896-.227 1.014-.643h.043c.118.42.617.648 1.12.648Zm-2.453-1.588v-.227c0-.546.227-.791.573-.791.297 0 .572.192.572.708v.367c0 .573-.253.744-.564.744-.354 0-.581-.215-.581-.8Z" /></svg
                ></span>
              </div>
            </div>
            <div class="flex flex-col gap-2 mb-3">
              <label for="password">Password</label>
              <div class="flex relative">
                <input
                  type="password"
                  id="password"
                  class="w-full border py-2 focus:ring-2 focus:ring-indigo-500/50 px-3 rounded-lg outline-none"
                  placeholder="*****************************" />
                <span class="absolute right-6 top-3 text-gray-600"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    class="bi bi-lock"
                    viewBox="0 0 16 16">
                    <path
                      d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM5 8h6a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z" /></svg
                ></span>
              </div>
            </div>
            <div class="flex justify-between items-center">
              <button
                class="px-8 py-2 rounded-lg bg-gradient-to-r from-indigo-900 to-indigo-600 text-white font-semibold hover:from-indigo-500 hover:to-cyan-500 transition-all duration-1000 focus:ring-2"
                type="button">
                Log In
              </button>
              <a
                href="#"
                class="text-sm text-gray-500 hover:hover:text-indigo-700"
                >Forgot password?</a
              >
            </div>
            <p class="mt-6 text-gray-700">
              Don't have account?
              <a
                href="#"
                class="hover:text-indigo-700 font-semibold transition duration-200"
                >Create</a
              >
              free account now!
            </p>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
